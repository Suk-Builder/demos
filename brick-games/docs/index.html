<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title data-i18n="title">递砖游戏 · 月夜见0</title>
<style>
:root{--primary:#c39f9f;--accent:#d4b0b0;--bg:#0a0a0f;--text:#e8e0d8;--muted:#a69ba0;--dim:#5a5060}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif SC','Georgia',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(139,157,195,0.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(201,169,110,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.lang-switcher{position:fixed;top:12px;right:12px;z-index:9999;display:flex;gap:4px;background:rgba(10,10,15,0.85);backdrop-filter:blur(8px);padding:4px 6px;border-radius:20px;border:1px solid #3a3540}
.lang-btn{background:transparent;border:none;cursor:pointer;font-size:1.1rem;padding:3px 6px;border-radius:14px;opacity:0.5;transition:all .2s;filter:grayscale(0.3)}.lang-btn:hover{opacity:.8;background:rgba(184,149,106,.15)}.lang-btn.active{opacity:1;filter:grayscale(0);background:rgba(184,149,106,.25);box-shadow:0 0 8px rgba(184,149,106,.2)}
.container{position:relative;z-index:1;max-width:700px;width:100%}
h1{font-size:clamp(2.2rem,7vw,4.5rem);color:var(--primary);margin-bottom:8px;text-shadow:0 0 30px rgba(201,169,110,.2);font-weight:700}
h2{font-size:clamp(0.9rem,2.5vw,1.3rem);color:var(--muted);font-weight:400;margin-bottom:6px;letter-spacing:2px;text-transform:uppercase}
.desc{font-size:clamp(1rem,2.5vw,1.15rem);color:var(--muted);max-width:560px;line-height:1.9;margin:24px auto}
.motto{font-style:italic;color:var(--accent);margin:32px 0;font-size:clamp(1.1rem,3vw,1.4rem);text-shadow:0 0 15px rgba(201,169,110,.15)}
.links{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:36px 0}
a{display:inline-block;padding:10px 22px;border:1px solid #3a3540;border-radius:10px;color:var(--accent);text-decoration:none;font-size:0.92rem;transition:all .25s;background:rgba(255,255,255,0.02)}a:hover{background:rgba(184,149,106,.12);border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,0,0,.3)}
.footer{margin-top:auto;padding-top:50px;font-size:0.78rem;color:var(--dim);position:relative;z-index:1}
@media(max-width:600px){.lang-switcher{top:6px;right:6px;padding:3px 4px}.lang-btn{font-size:0.95rem;padding:2px 4px}}
</style>
</head>
<body>
<div class="lang-switcher">
<button class="lang-btn" data-lang="zh" onclick="setLang('zh')">🇨🇳</button>
<button class="lang-btn" data-lang="en" onclick="setLang('en')">🇬🇧</button>
<button class="lang-btn" data-lang="de" onclick="setLang('de')">🇩🇪</button>
<button class="lang-btn" data-lang="fr" onclick="setLang('fr')">🇫🇷</button>
</div>
<div class="container">
<h2 data-i18n="subtitle">Tsukuyomi 0 · Charter Town</h2>
<h1 data-i18n="title_h1">递砖游戏</h1>
<div class="desc" data-i18n="description">游戏化学习 — 用裂缝和砖块玩出认知操作系统。</div>
<div class="motto" data-i18n="motto">用裂缝和砖块玩游戏。</div>
<div class="links">
<a href="https://github.com/Suk-Builder/brick-games" data-i18n="link_github">GitHub 仓库</a>
<a href="https://sora-o.com" data-i18n="link_main">主站</a>
<a href="https://tsukiyomi.world" data-i18n="link_town">宪章小镇</a>
</div>
</div>
<div class="footer" data-i18n="footer">
© 2026 月夜见0 · 递砖机认知操作系统 · 递砖游戏
</div>
<script>
const I18N={
"title":{"zh":"递砖游戏 · 月夜见0","en":"Brick Games · Tsukuyomi 0","de":"Bausteinspiele · Tsukuyomi 0","fr":"Jeux de Briques · Tsukuyomi 0"},
"title_h1":{"zh":"递砖游戏","en":"Brick Games","de":"Bausteinspiele","fr":"Jeux de Briques"},
"subtitle":{"zh":"月夜见0 · 递砖机认知操作系统","en":"Tsukuyomi 0 · Bricklayer Cognitive OS","de":"Tsukuyomi 0 · Bausteinleger Kognitives BS","fr":"Tsukuyomi 0 · OS Cognitif Poseur de Briques"},
"description":{"zh":"游戏化学习 — 用裂缝和砖块玩出认知操作系统。","en":"Gamified learning — playing with cracks and bricks to build a cognitive OS.","de":"Spielerisches Lernen — mit Rissen und Steinen ein kognitives BS bauen.","fr":"Apprentissage ludique — jouer avec des fissures et des briques pour construire un OS cognitif."},
"motto":{"zh":"用裂缝和砖块玩游戏。","en":"Play with cracks and bricks.","de":"Mit Rissen und Steinen spielen.","fr":"Jouer avec des fissures et des briques."}},
"link_github":{"zh":"GitHub 仓库","en":"GitHub Repo","de":"GitHub-Repo","fr":"Dépôt GitHub"},
"link_main":{"zh":"主站","en":"Main Site","de":"Hauptseite","fr":"Site Principal"},
"link_town":{"zh":"宪章小镇","en":"Charter Town","de":"Charter-Stadt","fr":"Ville de la Charte"},
"footer":{"zh":"© 2026 月夜见0 · 递砖机认知操作系统 · 递砖游戏","en":"© 2026 Tsukuyomi 0 · Bricklayer Cognitive OS · Brick Games","de":"© 2026 Tsukuyomi 0 · Bausteinleger Kognitives BS · Bausteinspiele","fr":"© 2026 Tsukuyomi 0 · OS Cognitif Poseur de Briques · Jeux de Briques"}
};
function getLang(){var s=localStorage.getItem("tsukuyomi-lang");if(s&&["zh","en","de","fr"].indexOf(s)!==-1)return s;var n=navigator.language.slice(0,2);if(["zh","en","de","fr"].indexOf(n)!==-1)return n;return"zh"}
function setLang(l){localStorage.setItem("tsukuyomi-lang",l);applyLang();updateBtns()}
function applyLang(){var l=getLang();document.documentElement.lang=l==="zh"?"zh-CN":l==="en"?"en":l==="de"?"de":"fr";document.querySelectorAll("[data-i18n]").forEach(function(e){var k=e.getAttribute("data-i18n");if(I18N[k]&&I18N[k][l])e.textContent=I18N[k][l]});var t=document.querySelector("title[data-i18n]");if(t){var k=t.getAttribute("data-i18n");if(I18N[k]&&I18N[k][l])document.title=I18N[k][l]}}
function updateBtns(){var l=getLang();document.querySelectorAll(".lang-btn").forEach(function(b){b.classList.toggle("active",b.dataset.lang===l)})}
document.addEventListener("DOMContentLoaded",function(){applyLang();updateBtns()});
</script>
</body>
</html>

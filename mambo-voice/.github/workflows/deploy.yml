# ============================================
# 曼波语音助手 — GitHub Actions CI/CD 工作流
# 触发：main分支push时自动构建并部署
# ============================================

name: 曼波语音助手 CI/CD

# 触发条件
on:
  # 推送到main分支时触发
  push:
    branches: [main, master]
    paths-ignore:
      # 忽略文档和配置文件变更
      - "**.md"
      - ".env.example"
      - ".gitignore"
  # 支持手动触发
  workflow_dispatch:
    inputs:
      environment:
        description: "部署环境"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

# 环境变量（全局）
env:
  # Docker Hub配置
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  # 镜像名称
  IMAGE_NAME_FRONTEND: mambo-voice-frontend
  IMAGE_NAME_BACKEND: mambo-voice-backend
  # 部署服务器配置
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

# 权限控制
permissions:
  contents: read
  packages: write

jobs:
  # -------------------------------
  # 阶段1：代码检测
  # -------------------------------
  lint:
    name: 代码检测
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 设置Node.js环境
      - name: 设置 Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # 前端依赖安装与检测
      - name: 前端依赖安装
        working-directory: ./frontend
        run: npm ci

      - name: 前端代码检测 (ESLint)
        working-directory: ./frontend
        run: npm run lint || echo "跳过：未配置lint脚本"

      - name: 前端类型检查 (TypeScript)
        working-directory: ./frontend
        run: npm run type-check || echo "跳过：未配置type-check脚本"

      # 后端依赖安装与检测
      - name: 后端依赖安装
        working-directory: ./backend
        run: npm ci

      - name: 后端代码检测 (ESLint)
        working-directory: ./backend
        run: npm run lint || echo "跳过：未配置lint脚本"

  # -------------------------------
  # 阶段2：构建Docker镜像
  # -------------------------------
  build:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: lint
    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 设置QEMU（多架构支持）
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      # 设置Docker Buildx
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录Docker Hub
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 构建并推送前端镜像
      - name: 构建前端镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 多标签：latest + commit SHA + 时间戳
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.run_number }}
          # 构建缓存（加速后续构建）
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          # 构建参数
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_APP_NAME=曼波语音助手
            VITE_WS_URL=wss://mambo.sukaczev.top/ws

      # 构建并推送后端镜像
      - name: 构建后端镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_BACKEND }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.run_number }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # -------------------------------
  # 阶段3：部署到服务器
  # -------------------------------
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: build
    # 仅main分支且非PR时部署
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      # 检出代码（获取部署脚本）
      - name: 检出代码
        uses: actions/checkout@v4

      # 设置SSH密钥
      - name: 设置 SSH 密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # 配置SSH主机指纹（防止中间人攻击）
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || '22' }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # 执行远程部署
      - name: 远程部署
        env:
          SSH_CMD: "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || '22' }} -o StrictHostKeyChecking=yes"
        run: |
          echo "===== 开始部署到生产服务器 ====="
          # 将部署脚本上传到服务器
          rsync -avz -e "$SSH_CMD" \
            ./scripts/deploy.sh \
            ./docker-compose.yml \
            ./.env.production \
            ./nginx.conf \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/mambo-voice/

          # 执行远程部署脚本
          $SSH_CMD ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /opt/mambo-voice && bash deploy.sh ${{ github.sha }}"

          echo "===== 部署完成 ====="

      # 清理SSH密钥
      - name: 清理 SSH 密钥
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # -------------------------------
  # 阶段4：健康检查
  # -------------------------------
  healthcheck:
    name: 健康检查
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: 等待服务启动
        run: sleep 30

      - name: 检查前端服务
        run: |
          echo "检查前端服务..."
          curl -f -o /dev/null -s -w "前端HTTP状态: %{http_code}\n" \
            https://mambo.sukaczev.top/health || exit 1

      - name: 检查后端API服务
        run: |
          echo "检查后端API服务..."
          curl -f -s -w "后端HTTP状态: %{http_code}\n" \
            https://mambo.sukaczev.top/api/health || exit 1

      - name: 检查端到端
        run: |
          echo "执行端到端检查..."
          curl -f -s https://mambo.sukaczev.top/api/mood > /dev/null && \
            echo "情绪API: OK" || echo "情绪API: 跳过"

      - name: 部署结果通知
        if: always()
        run: |
          if [ "${{ needs.healthcheck.result }}" == "success" ]; then
            echo "✅ 部署成功！网站地址：https://mambo.sukaczev.top"
          else
            echo "❌ 健康检查未通过，请查看服务器日志"
          fi

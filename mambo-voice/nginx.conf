# ============================================
# 曼波语音助手 — Nginx 反向代理配置
# 域名：mambo.sukaczev.top
# ============================================

# 定义上游后端服务（用于负载均衡，当前单实例）
upstream backend_servers {
    # 后端服务地址（通过Docker网络解析）
    server backend:3001 weight=5 max_fails=3 fail_timeout=30s;
    # 保持长连接
    keepalive 32;
}

# HTTP服务器（80端口）— 重定向到HTTPS
server {
    listen 80;
    server_name mambo.sukaczev.top;

    # ACME挑战路径（用于SSL证书自动续期）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 所有请求重定向到HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS服务器（443端口）— 主服务
server {
    listen 443 ssl http2;
    server_name mambo.sukaczev.top;

    # ---- SSL证书配置 ----
    # SSL证书路径（使用Let's Encrypt免费证书）
    ssl_certificate     /etc/letsencrypt/live/mambo.sukaczev.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mambo.sukaczev.top/privkey.pem;

    # SSL安全参数
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- 安全响应头 ----
    # 启用HSTS（强制HTTPS）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # 防止MIME类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    # 防止点击劫持
    add_header X-Frame-Options "DENY" always;
    # 内容安全策略
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.deepseek.com;" always;
    # 引用策略
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Gzip压缩配置 ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ---- 客户端文件上传大小限制 ----
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ---- 日志配置 ----
    access_log /var/log/nginx/mambo.access.log;
    error_log  /var/log/nginx/mambo.error.log warn;

    # ---- API代理路径 ----
    location /api/ {
        # 代理到后端服务
        proxy_pass http://backend_servers/;
        proxy_http_version 1.1;

        # 连接参数
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        # 代理请求头（传递真实客户端信息）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket支持（用于实时通信）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # 隐藏后端服务器信息
        proxy_hide_header X-Powered-By;
    }

    # ---- WebSocket代理路径 ----
    location /ws {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket长连接超时
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- 健康检查路径 ----
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ---- 静态文件服务（前端React应用） ----
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # 支持React Router（所有路由指向index.html）
        try_files $uri $uri/ /index.html;

        # 静态文件缓存策略
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webm|mp4)$ {
            # 缓存30天
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Cache-Status "HIT" always;
            # 消除404日志噪音
            log_not_found off;
        }

        # HTML文件不缓存（确保更新后立即生效）
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # JSON文件缓存（manifest等）
        location ~* \.json$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }
}
